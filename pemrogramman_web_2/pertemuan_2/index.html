<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pertemuan_3</title>
</head>
<body>
    <h1>Pertemuan 3</h1>
    <form action="coba.html" method="get">
    <div>
        <label for="nama">Nama</label>
        <input type="text" name="nama" id="" placeholder="Masukkan Nama Anda">
        <br>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Masukkan Email Anda">
        <br>
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Masukkan Password Anda">
    </div>
    <br>

<div>
     <label for="Jenis Kelamin">Jenis Kelamin</label>
     <br>
    <input type="radio" name="jenis_kelamin" id="perempuan" value="Perempuan"> <label for="perempuan">Perempuan</label>
    <input type="radio" name="jenis_kelamin" id="laki-laki" value="Laki-Laki"> <label for="laki-laki">Laki-Laki</label>
</div>

<div>
    <input type="checkbox" name="Jaringan" id="Jaringan"> <label for="Jaringan">Jaringan</label>
    <input type="checkbox" name="Pemrograman Web" id="Pemrograman Web"> <label for="Pemrograman Web">Pemrograman Web</label>
    <input type="checkbox" name="Basis Data" id="Basis Data"> <label for="Basis Data">Basis Data</label>
</div>

<div>
    <label for="file">File</label>
    <input type="file" name="file" id="file">
</div>

    <div>
    <button type="submit">Submit</button>
    <button disabled="disabled">Disabled</button>
    <button type="reset">Reset</button>
    </form>
    </div>


</body>
</html>
